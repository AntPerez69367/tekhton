services:
  tekhton-conductor:
    build:
      context: ${TEKHTON_HOME}/conductor
      args:
        PUID: ${PUID}
        PGID: ${PGID}
    container_name: tekhton-conductor
    networks:
      - default
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    ports:
      - "${CONDUCTOR_PORT:-7411}:7411/tcp"
    volumes:
      # Config file
      - ${DOCKERDIR}/appdata/tekhton-conductor/conductor.cfg:/config/conductor.cfg:ro
      # Persistent state + logs
      - ${DOCKERDIR}/appdata/tekhton-conductor/data:/data
      # Tekhton source (read-only — conductor reads scripts + prompts)
      - ${TEKHTON_HOME}:/tekhton:ro
      # Target project repo (read-write — conductor does git operations)
      - ${TEKHTON_PROJECT_REPO}:/repo
      # SSH keys for git push (read-only)
      - ${USERDIR}/.ssh:/home/conductor/.ssh:ro
      # GitHub CLI auth (read-only)
      - ${USERDIR}/.config/gh:/home/conductor/.config/gh:ro
      # Claude CLI auth (read-only)
      - ${USERDIR}/.claude:/home/conductor/.claude:ro
    environment:
      TZ: $TZ
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      # Claude CLI needs this too
      HOME: /home/conductor
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:7411/status", "-H", "Authorization: Bearer ${CONDUCTOR_API_TOKEN}"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 15s
